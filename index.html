<!DOCTYPE html>
<html>
<head>
    <title>AI Chat Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .chat-container {
            max-width: 500px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: rgba(0,0,0,0.2);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            padding: 12px 16px;
            border-radius: 15px;
            margin: 8px 0;
            max-width: 70%;
            font-size: 14px;
        }

        .user {
            background: linear-gradient(to right, #56ab2f, #a8e063);
            align-self: flex-end;
            color: black;
        }

        .bot {
            background: rgba(255,255,255,0.9);
            align-self: flex-start;
            color: black;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: rgba(0,0,0,0.1);
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: white;
            padding: 5px;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        
        <div class="header">🤖 AI Chat Assistant</div>

        <!-- Chat messages -->
        <div class="chat-box" id="chat-box">
            {% for sender, message in chat_history %}
                <div class="message {{ sender }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>

        <!-- Input -->
        <form method="POST" class="input-area">
            <input type="text" name="user_input" placeholder="Type a message..." required>
            <button type="submit">Send</button>
        </form>

        <div class="footer">Built with ❤️ by Sona</div>

    </div>

    <!-- Auto scroll -->
    <script>
        var chatBox = document.getElementById("chat-box");
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>

</body>
</html>
